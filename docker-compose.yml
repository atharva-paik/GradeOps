services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gradeops
      POSTGRES_PASSWORD: gradeops
      POSTGRES_DB: gradeops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gradeops -d gradeops"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://gradeops:gradeops@db:5432/gradeops
      OCR_ENGINE: tesseract
      OCR_DEVICE: cpu
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./models_cache:/app/models_cache
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
